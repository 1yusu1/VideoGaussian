project_name: VideoGaussian
method: colmap_gs

scene: liminal_pool

data:
  video: assets/liminal_pool.mp4
  frames_dir: outputs/liminal_pool/frames
  fps: 12
  max_frames: null
  resize: null
  split:
    test_every: 8
    test_ratio: null
    seed: 0

paths:
  output_root: outputs/liminal_pool
  colmap_dir: outputs/liminal_pool/colmap
  dataset_dir: outputs/liminal_pool/colmap_gs/dataset
  result_dir: outputs/liminal_pool/colmap_gs/gsplat
  gsplat_examples_dir: third_party/gsplat/examples

third_party:
  gsplat: third_party/gsplat

models:
  da3_checkpoint: null

colmap:
  backend: pycolmap
  binary: colmap
  camera_model: OPENCV
  matcher: sequential
  single_camera: false

gsplat:
  data_dir: outputs/liminal_pool/colmap_gs/dataset
  result_dir: outputs/liminal_pool/colmap_gs/gsplat
  iterations: 30000
  eval_steps: 30000
  learning_rates:
    means: 0.00016
    colors: 0.0025
    opacities: 0.05
    scales: 0.005
    quats: 0.001
  depth_regularization:
    enabled: false
    weight: 0.0
  cuda_visible_devices: "0"
  data_factor: 1
  extra_args: []

render:
  output_dir: outputs/liminal_pool/colmap_gs/renders
  command: null
